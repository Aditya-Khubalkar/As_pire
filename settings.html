<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — AS-pire ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- ... existing HTML until the end of settings sections ... -->

  <!-- NEW THEME SECTION -->
  <div class="settings-section">
    <div class="section-label">Theme Mode</div>
    <div class="setting-card">
      <div class="setting-row">
        <div class="setting-info">
          <div class="s-name">🌗 Dark / Light Mode</div>
          <div class="s-desc">Switch between dark sage and light fresh look</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="switchTheme('dark')" style="padding:10px 20px;border-radius:9999px;border:2px solid var(--border);background:var(--s1);color:var(--text);font-weight:700;cursor:pointer;">🌙 Dark</button>
          <button onclick="switchTheme('light')" style="padding:10px 20px;border-radius:9999px;border:2px solid var(--border);background:var(--s1);color:var(--text);font-weight:700;cursor:pointer;">☀️ Light</button>
        </div>
      </div>
    </div>
  </div>

<!-- Rest of your settings HTML remains the same -->

<script>
document.addEventListener('DOMContentLoaded',function(){
  // ... your existing script ...

  window.switchTheme = function(mode) {
    window.ASPIRE_THEME.switchMode(mode);
    // Visual feedback
    const btns = document.querySelectorAll('.setting-card button');
    btns.forEach(b => b.style.opacity = mode === (b.textContent.includes('Dark') ? 'dark' : 'light') ? '1' : '0.6');
  };

  // Render current mode on load
  render();
});
</script>
</body>
</html>
