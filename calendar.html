<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>As_pire — Calendar</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>

<!-- Sticky Note -->
<div class="sticky-note-wrapper" id="stickyWrapper">
  <div class="sticky-note" id="stickyExpanded">
    <button class="sticky-collapse-btn" onclick="collapseSticky()" title="Minimise">−</button>
    <div class="sticky-note-label">📌 Shared Note</div>
    <textarea id="stickyTextarea" placeholder="Write a shared note…" rows="4" oninput="onStickyInput()"></textarea>
  </div>
  <div class="sticky-minimized hidden" id="stickyMin" onclick="expandSticky()" title="Open note">📌</div>
</div>

<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo"><span class="logo-dot"></span><span>As_pire</span></div>
    <ul class="nav-links">
      <li><a href="index.html"><span class="nav-icon">🏠</span><span>Home</span></a></li>
      <li><a href="calendar.html" class="active"><span class="nav-icon">📅</span><span>Calendar</span></a></li>
      <li><a href="settings.html"><span class="nav-icon">⚙️</span><span>Settings</span></a></li>
    </ul>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userNameDisplay">Loading…</span>
      </div>
      <button class="logout-btn" onclick="logout()"><span>🚪</span><span>Log out</span></button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1>Calendar</h1>
        <p class="subtitle">Track what you've done, day by day.</p>
      </div>
      <!-- Month navigation -->
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-ghost" onclick="changeMonth(-1)">‹</button>
        <span id="monthLabel" style="font-family:var(--font-display);font-size:1.1rem;min-width:140px;text-align:center;"></span>
        <button class="btn btn-ghost" onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <!-- User filter tabs -->
    <div style="display:flex;gap:8px;margin-bottom:16px;" id="userTabs"></div>

    <!-- Calendar Grid -->
    <div class="card" style="padding:16px;">
      <div class="calendar-grid" id="calGrid">
        <!-- Headers -->
        <div class="cal-header-cell">Sun</div>
        <div class="cal-header-cell">Mon</div>
        <div class="cal-header-cell">Tue</div>
        <div class="cal-header-cell">Wed</div>
        <div class="cal-header-cell">Thu</div>
        <div class="cal-header-cell">Fri</div>
        <div class="cal-header-cell">Sat</div>
      </div>
    </div>
  </main>
</div>

<!-- Day Detail Modal -->
<div class="modal-overlay" id="dayModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="dayModalTitle">Day</span>
      <button class="modal-close" onclick="closeDayModal()">✕</button>
    </div>
    <div id="dayModalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
let allTasks = [];
let knownUsers = [];
let selectedUser = null;
let viewYear, viewMonth;
let stickyDebounce = null;

document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAuth();
  if (!user) return;
  document.getElementById('userNameDisplay').textContent = user.username;
  document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();

  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  await initSupabase();
  await loadKnownUsers();
  selectedUser = knownUsers[0] || user.username;
  renderUserTabs();
  await loadAllTasks();
  await loadSticky();
  setupRealtime();
});

async function loadKnownUsers() {
  try {
    const { data } = await supabase.from('settings').select('value').eq('key','usernames').single();
    knownUsers = data?.value ? JSON.parse(data.value) : [];
  } catch { knownUsers = []; }
  if (!knownUsers.includes(AppState.currentUser.username)) {
    knownUsers.push(AppState.currentUser.username);
  }
}

async function loadAllTasks() {
  allTasks = [];
  for (const u of knownUsers) {
    const tasks = await fetchTasksForUser(u).catch(() => []);
    allTasks.push(...tasks);
  }
  renderCalendar();
}

function renderUserTabs() {
  const tabs = document.getElementById('userTabs');
  tabs.innerHTML = knownUsers.map(u => `
    <button class="btn ${selectedUser === u ? 'btn-primary' : 'btn-ghost'}" onclick="selectUser('${escapeHtml(u)}')">${escapeHtml(u)}</button>
  `).join('');
}

function selectUser(u) {
  selectedUser = u;
  renderUserTabs();
  renderCalendar();
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  // Keep headers
  const headers = Array.from(grid.querySelectorAll('.cal-header-cell'));
  grid.innerHTML = '';
  headers.forEach(h => grid.appendChild(h));

  const today = new Date();
  const todayStr2 = today.toISOString().split('T')[0];

  // Month label
  document.getElementById('monthLabel').textContent = new Date(viewYear, viewMonth, 1)
    .toLocaleDateString('en-US', { month:'long', year:'numeric' });

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();

  // Pad start
  for (let i = firstDay - 1; i >= 0; i--) {
    const dayDiv = buildDayCell(viewYear, viewMonth - 1 < 0 ? viewYear - 1 : viewYear,
      viewMonth - 1 < 0 ? 11 : viewMonth - 1, daysInPrevMonth - i, true, todayStr2);
    grid.appendChild(dayDiv);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dayDiv = buildDayCell(viewYear, viewMonth, d, d, false, todayStr2);
    grid.appendChild(dayDiv);
  }

  // Pad end
  const total = firstDay + daysInMonth;
  const remaining = (7 - (total % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    const dayDiv = buildDayCell(viewYear, viewMonth + 1 > 11 ? viewYear + 1 : viewYear,
      viewMonth + 1 > 11 ? 0 : viewMonth + 1, d, true, todayStr2);
    grid.appendChild(dayDiv);
  }
}

function buildDayCell(year, month, day, displayDay, otherMonth, todayStrVal) {
  const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const isToday = dateStr === todayStrVal;

  // Get tasks for this user on this date
  const username = selectedUser;
  const fixedTasks = allTasks.filter(t => t.username === username && t.is_fixed && t.type === 'daily');
  const dailyTasks = allTasks.filter(t => t.username === username && !t.is_fixed && t.type === 'daily' && t.date_key === dateStr);
  const dayTasks = [...fixedTasks, ...dailyTasks];

  const div = document.createElement('div');
  div.className = `cal-day${otherMonth ? ' other-month' : ''}${isToday ? ' today' : ''}`;
  div.addEventListener('click', () => openDayModal(dateStr, dayTasks));

  let dotsHtml = '';
  const maxDots = 3;
  dayTasks.slice(0, maxDots).forEach(t => {
    const cd = t.completed_dates || [];
    const done = cd.includes(dateStr) || (isToday && t.completed);
    dotsHtml += `<div class="cal-task-dot ${done ? 'done' : 'missed'}">
      <div class="dot ${done ? '' : 'missed'}"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60px;">${escapeHtml(t.text)}</span>
    </div>`;
  });
  if (dayTasks.length > maxDots) {
    dotsHtml += `<div class="cal-task-dot" style="color:var(--text-muted)">+${dayTasks.length - maxDots} more</div>`;
  }

  div.innerHTML = `<div class="cal-day-num">${displayDay}</div>${dotsHtml}`;
  return div;
}

// ── Day Modal ─────────────────────────────────────────────────
function openDayModal(dateStr, tasks) {
  document.getElementById('dayModalTitle').textContent =
    new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  const body = document.getElementById('dayModalBody');
  if (tasks.length === 0) {
    body.innerHTML = '<p class="text-muted">No tasks for this day.</p>';
  } else {
    body.innerHTML = `
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:14px;">Check off tasks you completed on this day (even retroactively).</p>
      <ul class="task-list">
        ${tasks.map(t => {
          const cd = t.completed_dates || [];
          const done = cd.includes(dateStr) || (dateStr === todayStr() && t.completed);
          const isFixed = t.is_fixed;
          return `
          <li class="task-item ${done ? 'done' : ''}" id="modal-task-${t.id}">
            <input type="checkbox" class="task-check" ${done ? 'checked' : ''}
              data-task-id="${t.id}" data-date="${dateStr}"
              onchange="handleModalToggle(this)" />
            <span class="task-label">${escapeHtml(t.text)}</span>
            ${isFixed ? '<span class="task-fixed-badge">FIXED</span>' : ''}
          </li>`;
        }).join('')}
      </ul>`;
  }

  document.getElementById('dayModal').classList.add('open');
}

function closeDayModal() {
  document.getElementById('dayModal').classList.remove('open');
}

async function handleModalToggle(cb) {
  const taskId = cb.dataset.taskId;
  const dateStr = cb.dataset.date;
  const isChecked = cb.checked;
  const li = document.getElementById(`modal-task-${taskId}`);
  if (li) {
    if (isChecked) li.classList.add('done');
    else li.classList.remove('done');
  }
  try {
    await toggleTaskCompletedOnDate(taskId, dateStr, isChecked);
    await loadAllTasks(); // refresh calendar dots
  } catch(e) { showToast(e.message, 'error'); }
}

// ── Sticky ────────────────────────────────────────────────────
async function loadSticky() {
  const text = await fetchStickyNote();
  document.getElementById('stickyTextarea').value = text;
}
function onStickyInput() {
  clearTimeout(stickyDebounce);
  stickyDebounce = setTimeout(() => saveStickyNote(document.getElementById('stickyTextarea').value), 800);
}
function collapseSticky() {
  document.getElementById('stickyExpanded').classList.add('hidden');
  document.getElementById('stickyMin').classList.remove('hidden');
}
function expandSticky() {
  document.getElementById('stickyMin').classList.add('hidden');
  document.getElementById('stickyExpanded').classList.remove('hidden');
}

function setupRealtime() {
  subscribeToTasks(async () => { await loadAllTasks(); });
  subscribeToSettings(async (payload) => {
    if (payload?.new?.key === 'sticky_note') {
      document.getElementById('stickyTextarea').value = payload.new.value || '';
    }
  });
}

document.getElementById('dayModal').addEventListener('click', function(e) {
  if (e.target === this) closeDayModal();
});
</script>
</body>
</html>
