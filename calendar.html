<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — AS-pire ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="mesh"></div>

<div class="top-bar">
  <a href="index.html" class="logo-wrap">
    <span class="logo-AS">AS</span><span class="logo-dash">-</span><span class="logo-pire">pire</span>
  </a>
  <div class="top-actions">
    <a href="settings.html" class="icon-btn" title="Settings">⚙️</a>
    <a href="index.html" class="back-btn">← Back</a>
  </div>
</div>

<div class="calendar-wrap">

  <div class="cal-header">
    <div>
      <div class="page-title" style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;font-style:italic;color:var(--gold);">Calendar</div>
      <div class="page-subtitle">Daily task history for A &amp; S</div>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="cal-month" id="calMonthLabel"></div>

  <div class="cal-grid-header">
    <div class="cal-day-name">Sun</div>
    <div class="cal-day-name">Mon</div>
    <div class="cal-day-name">Tue</div>
    <div class="cal-day-name">Wed</div>
    <div class="cal-day-name">Thu</div>
    <div class="cal-day-name">Fri</div>
    <div class="cal-day-name">Sat</div>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="cal-detail" id="calDetail">
    <div class="cal-detail-header">
      <div class="cal-detail-date" id="calDetailDate"></div>
      <button class="cal-detail-close" onclick="closeDetail()">×</button>
    </div>
    <div id="calDetailContent"></div>
  </div>

  <div style="margin-top:24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);"></div> A tasks
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--lav);"></div> S tasks
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);">
      ✦ Click any date to see tasks
    </div>
  </div>

</div>

<div class="sync-pill">
  <div class="sync-dot local" id="syncDot"></div>
  <span id="syncLbl">local</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){

// ── FIREBASE ──
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDErNk02qqYnbVFskumgNGch47gJJCzMTA",
  authDomain: "aspire-2924d.firebaseapp.com",
  databaseURL: "https://aspire-2924d-default-rtdb.firebaseio.com",
  projectId: "aspire-2924d",
  storageBucket: "aspire-2924d.firebasestorage.app",
  messagingSenderId: "260852889050",
  appId: "1:260852889050:web:136fe46f8fd42db64b3ce3"
};

const fs = document.createElement('script');
fs.type = 'module';
fs.textContent = `
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  try {
    const app = initializeApp(${JSON.stringify(FIREBASE_CONFIG)});
    const db = getDatabase(app);
    onValue(ref(db,'aspire'), (snap) => { if(snap.val()) window._fbStateUpdate(snap.val()); });
    window._fbReady = true;
  } catch(e){ console.warn('Firebase error:', e); }
`;
document.head.appendChild(fs);
window._fbReady = false;

let _state = JSON.parse(localStorage.getItem('aspire_s')||'null') || {names:{you:'A',friend:'S'},calendar:{}};
if(!_state.calendar) _state.calendar = {};

window._fbStateUpdate = function(ns){
  _state = ns;
  if(!_state.calendar) _state.calendar = {};
  renderCalendar();
};

setInterval(function(){
  if(window._fbReady){
    document.getElementById('syncDot').className='sync-dot live';
    document.getElementById('syncLbl').textContent='live 🔥';
  }
},1000);

// ── TODAY'S TASKS — also include today's active tasks in calendar view ──
function getTodayKey(){
  var now = new Date();
  return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
}

function getCalendarDataForDate(dateKey){
  var data = {you: {}, friend: {}};
  // Try calendar archive first
  if(_state.calendar && _state.calendar[dateKey]){
    if(_state.calendar[dateKey].you) data.you = _state.calendar[dateKey].you;
    if(_state.calendar[dateKey].friend) data.friend = _state.calendar[dateKey].friend;
  }
  // For today: also merge active tasks
  if(dateKey === getTodayKey()){
    if(_state.you && _state.you.daily) Object.assign(data.you, _state.you.daily);
    if(_state.friend && _state.friend.daily) Object.assign(data.friend, _state.friend.daily);
  }
  return data;
}

var currentYear, currentMonth, selectedDate = null;
var today = new Date();
currentYear = today.getFullYear();
currentMonth = today.getMonth();

function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth > 11){ currentMonth = 0; currentYear++; }
  if(currentMonth < 0){ currentMonth = 11; currentYear--; }
  selectedDate = null;
  closeDetail();
  renderCalendar();
}
window.changeMonth = changeMonth;

function renderCalendar(){
  var yn = (_state.names&&_state.names.you)||'A';
  var fn = (_state.names&&_state.names.friend)||'S';

  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = months[currentMonth] + ' ' + currentYear;

  var firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
  var daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  var grid = document.getElementById('calGrid');
  var html = '';

  // Empty cells before start
  for(var i=0; i<firstDay; i++){
    html += '<div class="cal-cell cal-empty"></div>';
  }

  for(var d=1; d<=daysInMonth; d++){
    var dateKey = currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday = dateKey === todayStr;
    var isSelected = dateKey === selectedDate;
    var calData = getCalendarDataForDate(dateKey);
    var hasA = Object.keys(calData.you).length > 0;
    var hasS = Object.keys(calData.friend).length > 0;
    var hasData = hasA || hasS;

    var classes = 'cal-cell'+(isToday?' cal-today':'')+(hasData?' has-data':'')+(isSelected?' selected':'');
    var dots = '';
    if(hasA){
      var aDone = Object.values(calData.you).filter(function(t){return t.done;}).length;
      var aTotal = Object.values(calData.you).length;
      for(var j=0;j<Math.min(aTotal,3);j++){
        dots += '<div class="cal-dot a-dot'+(j < aDone?'':' undone')+'"></div>';
      }
    }
    if(hasS){
      var sDone = Object.values(calData.friend).filter(function(t){return t.done;}).length;
      var sTotal = Object.values(calData.friend).length;
      for(var j=0;j<Math.min(sTotal,3);j++){
        dots += '<div class="cal-dot s-dot'+(j < sDone?'':' undone')+'"></div>';
      }
    }

    html += '<div class="'+classes+'" onclick="selectDate(\''+dateKey+'\')">'
      +'<div class="cal-date">'+d+'</div>'
      +(dots?'<div class="cal-dots">'+dots+'</div>':'')
      +'</div>';
  }

  grid.innerHTML = html;
}

window.selectDate = function(dateKey){
  selectedDate = dateKey;
  renderCalendar();
  showDetail(dateKey);
};

function showDetail(dateKey){
  var yn = (_state.names&&_state.names.you)||'A';
  var fn = (_state.names&&_state.names.friend)||'S';

  var parts = dateKey.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var label = months[parseInt(parts[1])-1]+' '+parseInt(parts[2])+', '+parts[0];
  document.getElementById('calDetailDate').textContent = label;

  var calData = getCalendarDataForDate(dateKey);

  function renderUserTasks(tasks, userLabel, cls){
    var html = '<div class="cal-user-section"><div class="cal-user-label '+cls+'">'+userLabel+'</div>';
    var list = Object.values(tasks);
    if(!list.length){
      html += '<div class="no-tasks-cal">No tasks recorded</div>';
    } else {
      list.forEach(function(t){
        html += '<div class="cal-task-row'+(t.done?' done':'')+'"><div class="ct-chk">'+(t.done?'✓':'')+'</div><div class="ct-text">'+esc(t.text)+'</div></div>';
      });
    }
    html += '</div>';
    return html;
  }

  var content = renderUserTasks(calData.you, yn, 'a-label')
              + renderUserTasks(calData.friend, fn, 's-label');

  document.getElementById('calDetailContent').innerHTML = content;
  document.getElementById('calDetail').classList.add('show');
}

window.closeDetail = function(){
  selectedDate = null;
  document.getElementById('calDetail').classList.remove('show');
  renderCalendar();
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── STARS ──
(function(){
  var c=document.getElementById('starCanvas'), ctx=c.getContext('2d'), stars=[], W, H;
  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; genStars(); }
  function genStars(){
    stars=[];
    for(var i=0;i<100;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,baseO:Math.random()*0.4+0.08,speed:Math.random()*0.2+0.03,phase:Math.random()*Math.PI*2,freq:Math.random()*0.02+0.005});
  }
  var t=0;
  function draw(){
    ctx.clearRect(0,0,W,H); t+=0.016;
    stars.forEach(function(s){
      var o=s.baseO*(0.5+0.5*Math.sin(t*s.freq*60+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(240,215,150,'+o+')'; ctx.fill();
      s.y-=s.speed*0.25; if(s.y<-2)s.y=H+2;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize); resize(); draw();
})();

renderCalendar();
setInterval(renderCalendar, 30000); // refresh every 30s
});
</script>
</body>
</html>
