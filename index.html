<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS-pire ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ROCKET INTRO -->
<div id="rocketIntro">
  <div id="rocketEl">🚀</div>
  <div id="rocketTitle">AS-pire</div>
  <div id="rocketSub">accountability &amp; ambition</div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <canvas id="starCanvas"></canvas>
  <div class="mesh"></div>

  <div class="top-bar">
    <div class="logo-wrap" id="logoWrap" title="Double-click to rename">
      <span class="logo-AS">AS</span><span class="logo-dash">-</span><span class="logo-pire">pire</span>
    </div>
    <div class="top-actions">
      <button class="icon-btn" onclick="window.location.href='calendar.html'" title="Calendar">📅</button>
      <button class="icon-btn" onclick="window.location.href='settings.html'" title="Settings">⚙️</button>
    </div>
  </div>

  <div class="wrap">
    <div class="sticky-stage">
      <div class="sticky" id="stickyCard">
        <div class="s-hdr">✦ shared note — auto-saves as you type</div>
        <textarea class="s-body" id="sBody" rows="2" placeholder="Write something inspiring..."></textarea>
        <div class="s-saved" id="sSaved">saved ✓</div>
      </div>
    </div>

    <div class="header">
      <div class="tagline" id="taglineEl">accountability &amp; ambition · together</div>
      <div class="streak-badge" id="streakBadge">🔥 0 day streak</div>
    </div>

    <div class="demo-banner" id="demoBanner">⚡ Live • Connected</div>

    <div class="profile-bar">
      <span class="profile-lbl">Viewing:</span>
      <button class="p-btn active" id="btnYou" onclick="switchProfile('you')"> 
        <div class="p-avatar av-you" id="avYou">A</div>
        <span id="nameYou">You</span>
      </button>
      <button class="p-btn" id="btnFriend" onclick="switchProfile('friend')">
        <div class="p-avatar av-friend" id="avFriend">S</div>
        <span id="nameFriend">Friend</span>
      </button>
      <button class="nudge-btn" onclick="sendNudge()" title="Nudge your friend">⚡</button>
    </div>

    <div class="friend-notice" id="friendNotice" style="display:none">
      ✎ Editing <strong id="friendLabel">friend</strong>'s tasks
    </div>

    <div class="tab-wrap">
      <div class="tab-pill" id="tabPill"></div>
      <button class="tab-btn active" id="tDaily" onclick="switchTab('daily')">
        <span class="tab-icon">☀</span> Daily
      </button>
      <button class="tab-btn" id="tWeekly" onclick="switchTab('weekly')">
        <span class="tab-icon">◈</span> Weekly
      </button>
    </div>

    <div class="cdown">
      <span class="cd-lbl" id="cdLbl">No tasks yet</span>
      <span class="cd-val"><span class="live-dot"></span><span id="cdVal">—</span></span>
    </div>

    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl" id="progLbl">Daily Progress</span>
        <span class="prog-pct" id="progPct">0%</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="progFill" style="width:0%"></div>
      </div>
    </div>

    <div class="add-row">
      <input type="text" class="t-input" id="tInput" placeholder="Add a new task...">
      <button class="add-btn" id="addBtn" title="Add task">+</button>
    </div>

    <div class="tasks" id="taskList"></div>
    <div class="all-done" id="allDone">
      <div class="all-done-title">✦ Every task complete ✦</div>
      <div class="all-done-sub">you're absolutely unstoppable</div>
    </div>
  </div>
</div>

<!-- NAMES MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Set Names</div>
    <div class="m-field"><label>Your name (A)</label><input type="text" class="m-input" id="mYour" placeholder="e.g. Aryan"></div>
    <div class="m-field"><label>Friend's name (S)</label><input type="text" class="m-input" id="mFriend" placeholder="e.g. Sahil"></div>
    <div class="m-btns">
      <button class="m-btn secondary" onclick="closeModal()">Cancel</button>
      <button class="m-btn primary" onclick="saveNames()">Save ✓</button>
    </div>
  </div>
</div>

<div class="sync-pill">
  <div class="sync-dot local" id="syncDot"></div>
  <span id="syncLbl">live 🔥</span>
</div>

<!-- NEW APP.JS -->
<script src="app.js"></script>

</body>
</html>
