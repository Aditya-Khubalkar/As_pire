<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS-pire ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Rocket intro and all HTML unchanged until script -->

<script>
document.addEventListener('DOMContentLoaded', function() {
  // ... (all your existing code stays the same until renderAll) ...

  // Enhanced crazy particles on load
  function launchCrazyBurst() {
    if (!window.ASPIRE_THEME.animations.crazyParticles) return;
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'cf';
        el.textContent = ['🚀','✦','🔥','🌟'][Math.floor(Math.random()*4)];
        el.style.left = Math.random()*100 + 'vw';
        el.style.bottom = '-50px';
        el.style.fontSize = '22px';
        el.style.animationDuration = (1.5 + Math.random()*2) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 8);
    }
  }
  setTimeout(launchCrazyBurst, 800);

  // ... rest of your script remains unchanged ...
});
</script>
</body>
</html>
