<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>As_pire — Home</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>

<!-- ── Sticky Note ─────────────────────────────────────────── -->
<div class="sticky-note-wrapper" id="stickyWrapper">
  <div class="sticky-note" id="stickyExpanded">
    <button class="sticky-collapse-btn" onclick="collapseSticky()" title="Minimise">−</button>
    <div class="sticky-note-label">📌 Shared Note</div>
    <textarea id="stickyTextarea" placeholder="Write a shared note for both of you…" rows="4" oninput="onStickyInput()"></textarea>
  </div>
  <div class="sticky-minimized hidden" id="stickyMin" onclick="expandSticky()" title="Open note">📌</div>
</div>

<!-- ── App Shell ───────────────────────────────────────────── -->
<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo"><span class="logo-dot"></span><span>As_pire</span></div>
    <ul class="nav-links">
      <li><a href="index.html" class="active"><span class="nav-icon">🏠</span><span>Home</span></a></li>
      <li><a href="calendar.html"><span class="nav-icon">📅</span><span>Calendar</span></a></li>
      <li><a href="settings.html"><span class="nav-icon">⚙️</span><span>Settings</span></a></li>
    </ul>
    <div class="sidebar-bottom">
      <div class="user-chip" id="userChip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userNameDisplay">Loading…</span>
      </div>
      <button class="logout-btn" onclick="logout()"><span>🚪</span><span>Log out</span></button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1>Today's Dashboard</h1>
        <p class="subtitle" id="todayLabel">Loading date…</p>
      </div>
    </div>

    <!-- Tab: Daily / Weekly -->
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <button class="btn btn-primary" id="tabDaily" onclick="switchTab('daily')">Daily Tasks</button>
      <button class="btn btn-ghost" id="tabWeekly" onclick="switchTab('weekly')">Weekly Tasks</button>
    </div>

    <!-- Users Grid -->
    <div class="users-grid" id="usersGrid">
      <!-- Rendered by JS -->
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Task</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Task Text</label>
      <input class="form-input" id="editTaskInput" type="text" />
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-primary" onclick="saveEditTask()">Save</button>
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────
let currentTab = 'daily';
let allTasks = [];
let knownUsers = [];
let editingTaskId = null;
let stickyDebounce = null;
let realtimeSub = null;
let settingsSub = null;

// ── Boot ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAuth();
  if (!user) return;

  // Show user info
  document.getElementById('userNameDisplay').textContent = user.username;
  document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();

  // Date label
  const today = new Date();
  document.getElementById('todayLabel').textContent = today.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  await initSupabase();
  await loadKnownUsers();
  await loadAllTasks();
  await loadSticky();
  setupRealtime();
  scheduleMidnightReset(() => loadAllTasks());
});

async function loadKnownUsers() {
  // Fetch all distinct usernames from tasks + settings
  // For simplicity, we store known usernames in settings table under 'usernames'
  try {
    const { data } = await supabase.from('settings').select('value').eq('key','usernames').single();
    knownUsers = data?.value ? JSON.parse(data.value) : [];
  } catch { knownUsers = []; }

  // Ensure current user is registered
  const me = AppState.currentUser.username;
  if (!knownUsers.includes(me)) {
    knownUsers.push(me);
    await supabase.from('settings').upsert({ key:'usernames', value: JSON.stringify(knownUsers) }, { onConflict:'key' });
  }
}

async function loadAllTasks() {
  allTasks = [];
  for (const u of knownUsers) {
    const tasks = await fetchTasksForUser(u).catch(() => []);
    allTasks.push(...tasks);
  }
  renderUsersGrid();
}

function renderUsersGrid() {
  const grid = document.getElementById('usersGrid');
  if (knownUsers.length === 0) {
    grid.innerHTML = '<p class="text-muted">No users found. Please add tasks to get started.</p>';
    return;
  }
  grid.innerHTML = knownUsers.map(u => renderUserSection(u)).join('');
  // Attach listeners
  grid.querySelectorAll('.task-check').forEach(cb => {
    cb.addEventListener('change', e => {
      const id = e.target.dataset.taskId;
      const date = e.target.dataset.date;
      handleToggleTask(id, date, e.target.checked);
    });
  });
}

function renderUserSection(username) {
  const isMe = (username === AppState.currentUser?.username);
  const today = todayStr();
  const wk = weekKey();

  let dailyTasks = [], weeklyTasks = [], fixedTasks = [];
  if (currentTab === 'daily') {
    dailyTasks = getDailyTasks(allTasks, username, today);
    fixedTasks = getFixedTasksAsDaily(allTasks, username, today);
  } else {
    weeklyTasks = getWeeklyTasks(allTasks, username, wk)
      .filter(t => !isWeeklyExpired(t.week_key));
  }

  const tabTasks = currentTab === 'daily'
    ? [...fixedTasks, ...dailyTasks]
    : weeklyTasks;

  return `
  <div class="user-section" id="section-${escapeHtml(username)}">
    <div class="user-section-header">
      <div class="user-section-title">
        <div class="user-badge">${escapeHtml(username[0].toUpperCase())}</div>
        ${escapeHtml(username)}${isMe ? ' <span style="font-size:0.7rem;color:var(--text-muted);font-family:var(--font-body)">(you)</span>' : ''}
      </div>
      <span style="font-size:0.78rem;color:var(--text-muted);">
        ${tabTasks.filter(t => {
          const cd = t.completed_dates || [];
          return t.completed || cd.includes(today);
        }).length}/${tabTasks.length} done
      </span>
    </div>

    ${currentTab === 'daily' ? `
      ${fixedTasks.length > 0 ? `
        <div class="task-section-label">📌 Fixed Daily</div>
        <ul class="task-list">
          ${fixedTasks.map(t => renderTaskItem(t, today, true)).join('')}
        </ul>
      ` : ''}
      <div class="task-section-label">Today's Tasks</div>
      <ul class="task-list" id="daily-list-${escapeHtml(username)}">
        ${dailyTasks.length ? dailyTasks.map(t => renderTaskItem(t, today, false)).join('') : '<li class="text-muted" style="padding:8px 0;font-size:0.85rem;">No tasks yet.</li>'}
      </ul>
    ` : `
      <div class="task-section-label">This Week's Tasks</div>
      <ul class="task-list" id="weekly-list-${escapeHtml(username)}">
        ${weeklyTasks.length ? weeklyTasks.map(t => renderTaskItem(t, today, false)).join('') : '<li class="text-muted" style="padding:8px 0;font-size:0.85rem;">No weekly tasks yet.</li>'}
      </ul>
    `}

    <div class="add-task-row">
      <input class="add-task-input" type="text" id="newTask-${escapeHtml(username)}"
        placeholder="Add ${currentTab} task…"
        onkeydown="if(event.key==='Enter') addTaskForUser('${escapeHtml(username)}')" />
      <button class="btn btn-primary" onclick="addTaskForUser('${escapeHtml(username)}')">+</button>
    </div>
  </div>`;
}

function renderTaskItem(task, today, isFixed) {
  const cd = task.completed_dates || [];
  const done = task.completed || cd.includes(today);
  return `
  <li class="task-item ${done ? 'done' : ''}" id="task-${task.id}">
    <input type="checkbox" class="task-check" ${done ? 'checked' : ''}
      data-task-id="${task.id}" data-date="${today}" />
    <span class="task-label">${escapeHtml(task.text)}</span>
    ${isFixed ? '<span class="task-fixed-badge">FIXED</span>' : ''}
    <div class="task-actions">
      <button class="task-btn" onclick="openEditModal('${task.id}', ${JSON.stringify(escapeHtml(task.text))})" title="Edit">✎</button>
      <button class="task-btn delete" onclick="handleDeleteTask('${task.id}')" title="Delete">✕</button>
    </div>
  </li>`;
}

// ── Task Actions ──────────────────────────────────────────────
async function addTaskForUser(username) {
  const input = document.getElementById(`newTask-${username}`);
  const text = input?.value?.trim();
  if (!text) return;
  input.value = '';
  const today = todayStr();
  const wk = weekKey();
  try {
    await addTask({
      username, text,
      type: currentTab,
      date_key: currentTab === 'daily' ? today : null,
      week_key: currentTab === 'weekly' ? wk : null,
      is_fixed: false
    });
    showToast('Task added!');
    await loadAllTasks();
  } catch(e) { showToast(e.message, 'error'); }
}

async function handleToggleTask(taskId, dateStr, isChecked) {
  try {
    await toggleTaskCompletedOnDate(taskId, dateStr, isChecked);
    // Optimistic UI update
    const item = document.getElementById(`task-${taskId}`);
    if (item) {
      if (isChecked) item.classList.add('done');
      else item.classList.remove('done');
    }
  } catch(e) { showToast(e.message, 'error'); }
}

async function handleDeleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  try {
    await deleteTask(taskId);
    showToast('Task deleted.');
    await loadAllTasks();
  } catch(e) { showToast(e.message, 'error'); }
}

// ── Edit Modal ────────────────────────────────────────────────
function openEditModal(taskId, text) {
  editingTaskId = taskId;
  document.getElementById('editTaskInput').value = text;
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() {
  editingTaskId = null;
  document.getElementById('editModal').classList.remove('open');
}
async function saveEditTask() {
  const text = document.getElementById('editTaskInput').value.trim();
  if (!text || !editingTaskId) return;
  try {
    await updateTask(editingTaskId, { text });
    showToast('Task updated!');
    closeEditModal();
    await loadAllTasks();
  } catch(e) { showToast(e.message, 'error'); }
}

// ── Tab switching ─────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabDaily').className = tab === 'daily' ? 'btn btn-primary' : 'btn btn-ghost';
  document.getElementById('tabWeekly').className = tab === 'weekly' ? 'btn btn-primary' : 'btn btn-ghost';
  renderUsersGrid();
}

// ── Sticky Note ───────────────────────────────────────────────
async function loadSticky() {
  const text = await fetchStickyNote();
  document.getElementById('stickyTextarea').value = text;
}

function onStickyInput() {
  clearTimeout(stickyDebounce);
  stickyDebounce = setTimeout(() => {
    saveStickyNote(document.getElementById('stickyTextarea').value);
  }, 800);
}

function collapseSticky() {
  document.getElementById('stickyExpanded').classList.add('hidden');
  document.getElementById('stickyMin').classList.remove('hidden');
}
function expandSticky() {
  document.getElementById('stickyMin').classList.add('hidden');
  document.getElementById('stickyExpanded').classList.remove('hidden');
}

// ── Realtime ──────────────────────────────────────────────────
function setupRealtime() {
  realtimeSub = subscribeToTasks(async () => {
    await loadAllTasks();
  });
  settingsSub = subscribeToSettings(async (payload) => {
    if (payload?.new?.key === 'sticky_note') {
      document.getElementById('stickyTextarea').value = payload.new.value || '';
    }
    if (payload?.new?.key === 'usernames') {
      try { knownUsers = JSON.parse(payload.new.value); } catch {}
      await loadAllTasks();
    }
  });
}

// Modal close on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
</script>
</body>
</html>
